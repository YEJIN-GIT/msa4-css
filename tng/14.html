<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./14.css">
  <title>I want YOU</title>
</head>
<body>
  <div class="container"> 
    <form action="">
      <div class="container-line">
        <p class="p-title">I want YOU!</p>
        <label for="nm" class="required-star">이름</label>
        <input type="text" id="nm" name="nm">
        <br>
        <label for="year" class="required-star">나이</label>
        <input type="number" id="year" name="year" min="20"> 
        <br>
        <label class="required-star">성별</label>
        <input type="radio" name="mf" id="m"checked>
        <label for="m">남자</label>
        <input type="radio" name="mf" id="f">
        <label for="f">여자</label>
        <br>
        <div>
          <label for="memo">요청사항</label>
          <textarea name="memo" id="memo" rows="10" cols="32" placeholder="요청 사항 입력"></textarea>
        </div>
        <br>
        <div class="required-msg">
          <button type="submit">보내기</button>
        </div>
      </div>
    </form>
  </div>
</body>
</html>
